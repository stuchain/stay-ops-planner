services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stayops
      POSTGRES_PASSWORD: stayops
      POSTGRES_DB: stayops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stayops -d stayops"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stayops:stayops@postgres:5432/stayops
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
