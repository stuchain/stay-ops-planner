name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run ESLint
        run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Generate Prisma client (required for cross-package type resolution)
        run: pnpm --filter @stay-ops/db generate
      - name: Build workspace packages that emit types consumed by `apps/web`
        run: pnpm --filter @stay-ops/shared build && pnpm --filter @stay-ops/db build && pnpm --filter @stay-ops/audit build && pnpm --filter @stay-ops/sync build
      - name: Run TypeScript no-emit check across workspace
        run: pnpm -r run typecheck

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Generate Prisma client (some unit tests transitively import generated types)
        run: pnpm --filter @stay-ops/db generate
      - name: Build workspace packages used by unit tests
        run: pnpm --filter @stay-ops/shared build && pnpm --filter @stay-ops/db build && pnpm --filter @stay-ops/audit build && pnpm --filter @stay-ops/sync build
      - name: Run Vitest unit project (jsdom, no DB)
        run: pnpm --filter @stay-ops/web run test:unit
